[package]
name = "navi-tagger"
version = "2.2.0"
edition = "2024"

[dependencies]
tauri = { version = "2.1", features = ["tray-icon"] }
axum = "0.8"
tokio = { version = "1.0", features = ["full"] }
lofty = "0.20"
reqwest = { version = "0.13", features = ["json"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[build-dependencies]
tauri-build = "2.0"