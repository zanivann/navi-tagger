<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Navi-Tagger Native</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #0f0f0f; color: #d1d1d1; padding: 2rem; max-width: 900px; margin: 0 auto; }
        .card { background: #161616; padding: 25px; border-radius: 10px; border: 1px solid #252525; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { margin: 0 0 20px 0; font-size: 1.5rem; color: #fff; border-bottom: 1px solid #252525; padding-bottom: 10px; }
        .form-group { margin-bottom: 10px; }
        label { display: block; font-size: 0.65rem; color: #777; text-transform: uppercase; margin-bottom: 3px; font-weight: 700; }
        input { width: 100%; padding: 6px; background: #1d1d1d; border: 1px solid #2d2d2d; color: #fff; border-radius: 4px; box-sizing: border-box; font-size: 0.85rem; }
        input:disabled { background: #111; color: #555; border-color: #1a1a1a; }
        .flex { display: flex; gap: 10px; }
        .grid-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; border-top: 1px solid #252525; padding-top: 20px; }
        .column { background: #1a1a1a; padding: 15px; border-radius: 8px; border: 1px solid #222; }
        h3 { margin-top: 0; font-size: 1rem; text-align: center; color: #888; }
        button { background: #0066cc; color: #fff; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: 600; width: 100%; transition: 0.2s; }
        button:hover { background: #0052a3; }
        button.secondary { background: #2d2d2d; width: auto; font-size: 0.8rem; }
        .cover-box { width: 100%; aspect-ratio: 1; background: #111; border-radius: 8px; border: 1px solid #333; margin-bottom: 15px; object-fit: cover; display: block; }
        .log { margin-top: 15px; font-family: monospace; font-size: 0.75rem; color: #00ff00; background: #000; padding: 10px; border-radius: 4px; display: none; }
        .info-text { font-size: 0.7rem; color: #aa8800; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Navi-Tagger <span style="color:#444">v2.4.0</span></h1>
        
        <div class="form-group">
            <label>Arquivo Alvo</label>
            <div class="flex">
                <input type="text" id="filePath" placeholder="/Caminho/do/arquivo.flac">
                <button class="secondary" onclick="browse()">Procurar</button>
            </div>
        </div>
        
        <div class="form-group" style="margin-top:15px">
            <label>Apple Music ID</label>
            <div class="flex">
                <input type="text" id="appleId" placeholder="ID da Faixa">
                <button class="secondary" onclick="autoSearch()">Auto-Detectar</button>
                <button class="secondary" onclick="fetchMeta()" style="background:#444">Consultar</button>
            </div>
        </div>

        <div class="grid-panel" id="comparisonPanel">
            <div class="column">
                <h3 style="color:#a83232">Arquivo Atual</h3>
                <img id="currCover" class="cover-box" src="" alt="Sem Capa">
                <div class="form-group"><label>Título</label><input type="text" id="c_title" disabled></div>
                <div class="form-group"><label>Artista</label><input type="text" id="c_artist" disabled></div>
                <div class="form-group"><label>Álbum</label><input type="text" id="c_album" disabled></div>
                <div class="form-group"><label>Gênero</label><input type="text" id="c_genre" disabled></div>
                <div class="flex">
                    <div class="form-group" style="flex:1"><label>Ano</label><input type="text" id="c_year" disabled></div>
                    <div class="form-group" style="flex:1"><label>Faixa</label><input type="text" id="c_track" disabled></div>
                    <div class="form-group" style="flex:1"><label>Disco</label><input type="text" id="c_disc" disabled></div>
                </div>
            </div>

            <div class="column">
                <h3 style="color:#32a852">Novos Dados (iTunes)</h3>
                <img id="newCover" class="cover-box" src="" alt="Nova Capa">
                <div class="form-group"><label>Título</label><input type="text" id="n_title"></div>
                <div class="form-group"><label>Artista</label><input type="text" id="n_artist"></div>
                <div class="form-group"><label>Álbum</label><input type="text" id="n_album"></div>
                <div class="form-group"><label>Gênero</label><input type="text" id="n_genre"></div>
                <div class="flex">
                    <div class="form-group" style="flex:1"><label>Ano</label><input type="text" id="n_year"></div>
                    <div class="form-group" style="flex:1"><label>Faixa</label><input type="text" id="n_track"></div>
                    <div class="form-group" style="flex:1"><label>Disco</label><input type="text" id="n_disc"></div>
                </div>
                <input type="hidden" id="n_fullDate"><input type="hidden" id="n_label">
                <input type="hidden" id="n_trackTot"><input type="hidden" id="n_discTot">
            </div>
        </div>

        <div style="margin-top:20px">
            <div class="info-text">Campos em branco na coluna direita NÃO apagarão os dados originais. O sistema preservará a tag antiga.</div>
            <button onclick="apply()" style="background:#28a745; padding: 15px; font-size: 1.1rem;">Gravar Alterações</button>
        </div>
        
        <div id="log" class="log"></div>
    </div>

    <script>
        const { invoke } = window.__TAURI__.core;

        function logMsg(msg) {
            const l = document.getElementById('log');
            l.style.display = 'block';
            l.innerText = msg;
        }

        async function loadCurrent(path, isReload = false) {
            try {
                if (!isReload) logMsg("[JARVIS] Lendo estrutura interna do arquivo...");
                
                const tags = await invoke('read_existing_tags', { path });
                document.getElementById('c_title').value = tags.title;
                document.getElementById('c_artist').value = tags.artist;
                document.getElementById('c_album').value = tags.album;
                document.getElementById('c_genre').value = tags.genre;
                document.getElementById('c_year').value = tags.year;
                document.getElementById('c_track').value = tags.track_num ? `${tags.track_num}/${tags.track_total}` : "";
                document.getElementById('c_disc').value = tags.disc_num ? `${tags.disc_num}/${tags.disc_total}` : "";
                
                if(tags.cover_base64) {
                    document.getElementById('currCover').src = tags.cover_base64;
                } else {
                    document.getElementById('currCover').removeAttribute('src');
                }
                
                // Controle de mensagens baseado no contexto
                if (!isReload) {
                    logMsg("[JARVIS] Arquivo carregado. Aguardando diretrizes.");
                } else {
                    logMsg("[JARVIS] Operação cirúrgica concluída. Matriz atualizada com sucesso.");
                }
            } catch (e) { logMsg("[ERRO] " + e); }
        }

        async function browse() { 
            try {
                const path = await invoke('browse_file');
                if(path) {
                    document.getElementById('filePath').value = path;
                    await loadCurrent(path);
                }
            } catch (e) { alert(e); }
        }

        async function autoSearch() {
            const path = document.getElementById('filePath').value;
            if(!path) return;
            
            const artist = document.getElementById('c_artist').value;
            const title = document.getElementById('c_title').value;
            let query = (artist && title) ? `${artist} ${title}` : path.split('/').pop().replace(/\.[^/.]+$/, "");

            logMsg(`[JARVIS] Buscando catálogo por: ${query}`);
            try {
                const id = await invoke('search_itunes', { term: query });
                document.getElementById('appleId').value = id;
                logMsg(`[JARVIS] ID ${id} detectado.`);
                fetchMeta();
            } catch (e) {
                logMsg("[JARVIS] Heurística falhou: " + e);
            }
        }

        async function fetchMeta() {
            const id = document.getElementById('appleId').value;
            if(!id) return;
            try {
                const d = await invoke('get_preview', { id });
                document.getElementById('n_title').value = d.title;
                document.getElementById('n_artist').value = d.artist;
                document.getElementById('n_album').value = d.album;
                document.getElementById('n_genre').value = d.genre;
                document.getElementById('n_year').value = d.year;
                document.getElementById('n_track').value = d.track_num;
                document.getElementById('n_disc').value = d.disc_num;
                
                document.getElementById('n_fullDate').value = d.full_date;
                document.getElementById('n_label').value = d.label;
                document.getElementById('n_trackTot').value = d.track_total;
                document.getElementById('n_discTot').value = d.disc_total;

                document.getElementById('newCover').src = d.artwork_url;
                logMsg("[JARVIS] Dados da Apple carregados no painel de edição.");
            } catch (e) {
                logMsg("[ERRO] " + e);
            }
        }

        async function apply() {
            const path = document.getElementById('filePath').value;
            if(!path) return logMsg("[JARVIS] Não posso operar o vácuo. Selecione um arquivo.");

            const coverSrc = document.getElementById('newCover').getAttribute('src');
            
            const data = {
                title: document.getElementById('n_title').value,
                artist: document.getElementById('n_artist').value,
                album: document.getElementById('n_album').value,
                genre: document.getElementById('n_genre').value,
                year: document.getElementById('n_year').value,
                full_date: document.getElementById('n_fullDate').value,
                label: document.getElementById('n_label').value,
                track_num: document.getElementById('n_track').value,
                track_total: document.getElementById('n_trackTot').value,
                disc_num: document.getElementById('n_disc').value,
                disc_total: document.getElementById('n_discTot').value,
                artwork_url: coverSrc && coverSrc.startsWith('http') ? coverSrc : "" 
            };
            
            logMsg("[JARVIS] Iniciando fusão de dados...");
            try {
                await invoke('apply_tags', { path, data });
                // Passamos 'true' para avisar que é um recarregamento pós-gravação
                await loadCurrent(path, true); 
            } catch (e) {
                logMsg("[JARVIS] Erro crítico na gravação: " + e);
            }
        }
    </script>
</body>
</html>
