<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Jarvis | Navi-Tagger</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #121212;
            color: #e0e0e0;
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
        }

        .card {
            background: #1e1e1e;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.75rem;
            color: #666;
            text-transform: uppercase;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #262626;
            border: 1px solid #333;
            color: #fff;
            border-radius: 6px;
            box-sizing: border-box;
            transition: 0.2s;
        }

        input:focus {
            border-color: #007bff;
            outline: none;
            background: #2d2d2d;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
        }

        button:hover {
            background: #0056b3;
        }

        button.apply {
            background: #28a745;
            display: none;
            height: 50px;
            font-size: 1rem;
            margin-top: 25px;
        }

        button.apply:hover {
            background: #218838;
        }

        #preview {
            margin-top: 25px;
            display: none;
            border-top: 2px solid #333;
            padding-top: 25px;
        }

        .preview-header {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            align-items: center;
        }

        #coverArt {
            width: 180px;
            height: 180px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.7);
            object-fit: cover;
            border: 1px solid #444;
        }

        .log {
            margin-top: 20px;
            padding: 12px;
            background: #000;
            font-family: 'SF Mono', monospace;
            font-size: 0.8rem;
            border-radius: 6px;
            color: #00ff00;
            display: none;
            border-left: 4px solid #00ff00;
        }
    </style>
</head>

<body>
    <div class="card">
        <div
            style="display: flex; align-items: center; gap: 15px; margin-bottom: 25px; border-bottom: 2px solid #333; padding-bottom: 15px;">
            <img src="/icon.png" alt="Navi-Tagger" style="width: 64px; height: 64px; border-radius: 10px;">
            <div>
                <h1 style="margin: 0; font-size: 1.8rem; color: #fff;">Navi-Tagger <span
                        style="font-weight:normal; color:#666">v2.1</span></h1>
                <p
                    style="margin: 2px 0 0 0; font-size: 0.85rem; color: #555; text-transform: uppercase; letter-spacing: 1px;">
                    Operação Nativa Mac Mini M4</p>
            </div>
        </div>

        <div class="form-group">
            <label>Caminho do Arquivo Local</label>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="filePath" placeholder="/Users/helder/Musica/track.flac" style="flex: 1;">
                <button type="button" onclick="browseFile()"
                    style="width: auto; margin: 0; background: #333;">Procurar</button>
            </div>
        </div>

        <div class="form-group">
            <label>Apple Music ID</label>
            <input type="text" id="appleId" placeholder="Ex: 1440879325">
            <button onclick="previewTags()">Inspecionar Metadados</button>
        </div>

        <div id="preview">
            <div class="preview-header">
                <img id="coverArt" src="" alt="Capa">
                <div style="flex:1">
                    <div class="form-group"><label>Título da Faixa</label><input type="text" id="title"></div>
                    <div class="form-group"><label>Artista</label><input type="text" id="artist"></div>
                </div>
            </div>

            <div class="grid">
                <div class="form-group"><label>Álbum</label><input type="text" id="album"></div>
                <div class="form-group"><label>Gênero</label><input type="text" id="genre"></div>
                <div class="form-group"><label>Ano</label><input type="text" id="year"></div>
                <div class="form-group"><label>Direitos (Copyright)</label><input type="text" id="copyright"></div>
            </div>

            <div class="grid" style="grid-template-columns: 1fr 1fr 1fr;">
                <div class="form-group"><label>Nº Faixa</label><input type="number" id="trackNum"></div>
                <div class="form-group"><label>Total Faixas</label><input type="number" id="trackTotal"></div>
                <div class="form-group"><label>Nº Disco</label><input type="number" id="discNum"></div>
            </div>

            <div class="form-group">
                <label>Selo / Comentário</label>
                <input type="text" id="comment">
            </div>

            <input type="hidden" id="hiresUrl">
            <button class="apply" id="btnApply" onclick="applyTags()">INJETAR METADADOS E CAPA</button>
        </div>
        <div id="log" class="log"></div>
    </div>

    <script>
        async function browseFile() {
            const res = await fetch('/api/browse');
            const path = await res.text();
            if (path) document.getElementById('filePath').value = path;
        }

        async function previewTags() {
            const id = document.getElementById('appleId').value;
            log("Conectando ao iTunes Search API...");
            const res = await fetch(`/api/preview?id=${id}`);
            if (!res.ok) return log("ERRO: ID não encontrado ou falha na Apple.", true);

            const data = await res.json();
            document.getElementById('title').value = data.trackName;
            document.getElementById('artist').value = data.artistName;
            document.getElementById('album').value = data.collectionName;
            document.getElementById('genre').value = data.genre;
            document.getElementById('year').value = data.year;
            document.getElementById('trackNum').value = data.trackNumber;
            document.getElementById('trackTotal').value = data.trackTotal;
            document.getElementById('discNum').value = data.discNumber;
            document.getElementById('copyright').value = data.copyright;
            document.getElementById('comment').value = data.isExplicit ? "Explicit Content" : "Clean Version";
            document.getElementById('hiresUrl').value = data.artworkUrl;
            document.getElementById('coverArt').src = data.artworkUrl;

            document.getElementById('preview').style.display = 'block';
            document.getElementById('btnApply').style.display = 'block';
            log("Metadados recuperados com sucesso.");
        }

        async function applyTags() {
            const payload = {
                file_path: document.getElementById('filePath').value,
                title: document.getElementById('title').value,
                artist: document.getElementById('artist').value,
                album: document.getElementById('album').value,
                genre: document.getElementById('genre').value,
                year: document.getElementById('year').value,
                track_number: parseInt(document.getElementById('trackNum').value),
                track_total: parseInt(document.getElementById('trackTotal').value),
                disc_number: parseInt(document.getElementById('discNum').value),
                copyright: document.getElementById('copyright').value,
                comment: document.getElementById('comment').value,
                artwork_url: document.getElementById('hiresUrl').value
            };

            log("Executando protocolo de injeção física...");
            const res = await fetch('/api/apply', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) log("SUCESSO: O arquivo físico foi purificado e atualizado.");
            else log("ERRO: O arquivo está bloqueado ou o caminho é inválido.", true);
        }

        function log(msg, error = false) {
            const el = document.getElementById('log');
            el.style.display = 'block';
            el.style.color = error ? '#ff4444' : '#00ff00';
            el.style.borderColor = error ? '#ff4444' : '#00ff00';
            el.innerText = `[Jarvis] > ${msg}`;
        }
    </script>
</body>

</html>
