<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Jarvis | Navi-Tagger Pro</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #121212;
            color: #e0e0e0;
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
        }

        .card {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 10px;
            background: #2c2c2c;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
            transition: 0.2s;
        }

        button:hover {
            background: #0056b3;
        }

        button.apply {
            background: #28a745;
            display: none;
            height: 60px;
            font-size: 1.1rem;
        }

        button.apply:hover {
            background: #218838;
        }

        #preview {
            margin-top: 25px;
            display: none;
            border-top: 1px solid #333;
            padding-top: 20px;
        }

        .preview-header {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            align-items: center;
        }

        #coverArt {
            width: 150px;
            height: 150px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
            object-fit: cover;
        }

        .log {
            margin-top: 15px;
            padding: 12px;
            background: #000;
            font-family: monospace;
            font-size: 0.85rem;
            border-radius: 4px;
            color: #0f0;
            display: none;
            border-left: 4px solid #0f0;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2 style="margin-top:0">Navidrome Tagger <span style="font-weight:normal; color:#666">v2.0</span></h2>

        <div class="form-group">
            <label>Caminho do Arquivo</label>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="filePath" placeholder="/volumes/media/musica.flac" style="flex: 1;">
                <button type="button" onclick="browseFile()"
                    style="width: auto; margin: 0; background: #444;">Procurar</button>
            </div>
        </div>

        <div class="form-group">
            <label>Apple Music ID</label>
            <input type="text" id="appleId" placeholder="Ex: 1583004514">
            <button onclick="previewTags()">Inspecionar Metadados</button>
        </div>

        <div id="preview">
            <div class="preview-header">
                <img id="coverArt" src="" alt="Capa">
                <div style="flex:1">
                    <div class="form-group"><label>Título da Faixa</label><input type="text" id="title"></div>
                    <div class="form-group"><label>Artista</label><input type="text" id="artist"></div>
                </div>
            </div>

            <div class="grid">
                <div class="form-group"><label>Álbum</label><input type="text" id="album"></div>
                <div class="form-group"><label>Gênero</label><input type="text" id="genre"></div>
                <div class="form-group"><label>Ano</label><input type="text" id="year"></div>
                <div class="form-group"><label>Copyright</label><input type="text" id="copyright"></div>
            </div>

            <div class="grid" style="grid-template-columns: 1fr 1fr 1fr;">
                <div class="form-group"><label>Nº Faixa</label><input type="number" id="trackNum"></div>
                <div class="form-group"><label>Total Faixas</label><input type="number" id="trackTotal"></div>
                <div class="form-group"><label>Disco</label><input type="number" id="discNum"></div>
            </div>

            <div class="form-group">
                <label>Comentário / Tag Especial</label>
                <input type="text" id="comment">
            </div>

            <input type="hidden" id="hiresUrl">
            <button class="apply" id="btnApply" onclick="applyTags()">GRAVAR NO DISCO</button>
        </div>
        <div id="log" class="log"></div>
    </div>

    <script>
        async function browseFile() {
            const res = await fetch('/api/browse');
            const path = await res.text();
            if (path) document.getElementById('filePath').value = path;
        }

        async function previewTags() {
            const id = document.getElementById('appleId').value;
            log("Consultando Apple Music API...");
            const res = await fetch(`/api/preview?id=${id}`);
            if (!res.ok) return log("Erro: ID não encontrado ou falha na rede.", true);

            const data = await res.json();
            document.getElementById('title').value = data.trackName;
            document.getElementById('artist').value = data.artistName;
            document.getElementById('album').value = data.collectionName;
            document.getElementById('genre').value = data.genre;
            document.getElementById('year').value = data.year;
            document.getElementById('trackNum').value = data.trackNumber;
            document.getElementById('trackTotal').value = data.trackTotal;
            document.getElementById('discNum').value = data.discNumber;
            document.getElementById('copyright').value = data.copyright;
            document.getElementById('comment').value = data.isExplicit ? "Explicit Content" : "Clean";
            document.getElementById('hiresUrl').value = data.artworkUrl;
            document.getElementById('coverArt').src = data.artworkUrl;

            document.getElementById('preview').style.display = 'block';
            document.getElementById('btnApply').style.display = 'block';
            log("Inspeção concluída. Verifique os campos antes de gravar.");
        }

        async function applyTags() {
            const payload = {
                file_path: document.getElementById('filePath').value,
                title: document.getElementById('title').value,
                artist: document.getElementById('artist').value,
                album: document.getElementById('album').value,
                genre: document.getElementById('genre').value,
                year: document.getElementById('year').value,
                track_number: parseInt(document.getElementById('trackNum').value),
                track_total: parseInt(document.getElementById('trackTotal').value),
                disc_number: parseInt(document.getElementById('discNum').value),
                copyright: document.getElementById('copyright').value,
                comment: document.getElementById('comment').value,
                artwork_url: document.getElementById('hiresUrl').value
            };

            log("Iniciando gravação física...");
            const res = await fetch('/api/apply', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) log("SUCESSO: Arquivo atualizado e limpo.");
            else log("ERRO: Falha ao acessar o arquivo físico.", true);
        }

        function log(msg, error = false) {
            const el = document.getElementById('log');
            el.style.display = 'block';
            el.style.color = error ? '#ff4444' : '#00ff00';
            el.style.borderColor = error ? '#ff4444' : '#00ff00';
            el.innerText = `[Jarvis] > ${msg}`;
        }
    </script>
</body>

</html>
