name: "Publish Release"

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: build and release
        uses: tauri-apps/tauri-action@v0 # <-- AQUI ESTÁ A CORREÇÃO CIRÚRGICA
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Navi-Tagger v__VERSION__"
          releaseBody: "Build nativo para Apple Silicon (M4)."
          releaseDraft: false # Já sai publicado
          prerelease: false
          args: --target aarch64-apple-darwin